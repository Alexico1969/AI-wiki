<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="450" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">
    AI Architecture Evolution: 2022-2026
  </text>
  
  <!-- Timeline line -->
  <line x1="100" y1="100" x2="850" y2="100" stroke="#333" stroke-width="3"/>
  
  <!-- Year markers -->
  <text x="100" y="125" font-size="14" text-anchor="middle" font-weight="bold" fill="#333">2022</text>
  <text x="300" y="125" font-size="14" text-anchor="middle" font-weight="bold" fill="#333">2023</text>
  <text x="500" y="125" font-size="14" text-anchor="middle" font-weight="bold" fill="#333">2024</text>
  <text x="700" y="125" font-size="14" text-anchor="middle" font-weight="bold" fill="#333">2025</text>
  <text x="850" y="125" font-size="14" text-anchor="middle" font-weight="bold" fill="#333">2026</text>
  
  <!-- Year dots -->
  <circle cx="100" cy="100" r="5" fill="#333"/>
  <circle cx="300" cy="100" r="5" fill="#333"/>
  <circle cx="500" cy="100" r="5" fill="#333"/>
  <circle cx="700" cy="100" r="5" fill="#333"/>
  <circle cx="850" cy="100" r="5" fill="#333"/>
  
  <!-- Era 1: Text-Only (2022) -->
  <g>
    <rect x="50" y="150" width="100" height="100" fill="#00A67E" rx="4"/>
    <text x="100" y="175" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Text-Only</text>
    <text x="100" y="195" font-size="11" text-anchor="middle" fill="white">GPT-3</text>
    <text x="100" y="210" font-size="11" text-anchor="middle" fill="white">Claude 1.x</text>
    <text x="100" y="235" font-size="10" text-anchor="middle" fill="white">Limitation:</text>
    <text x="100" y="250" font-size="10" text-anchor="middle" fill="white">No images</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M 160 200 L 180 200" stroke="#999" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Era 2: Bolted-On Vision (2023) -->
  <g>
    <rect x="200" y="150" width="100" height="100" fill="#4285F4" rx="4"/>
    <text x="250" y="175" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Bolted-On</text>
    <text x="250" y="195" font-size="11" text-anchor="middle" fill="white">Vision</text>
    <text x="250" y="210" font-size="11" text-anchor="middle" fill="white">GPT-4V</text>
    <text x="250" y="235" font-size="10" text-anchor="middle" fill="white">+ Vision</text>
    <text x="250" y="250" font-size="10" text-anchor="middle" fill="white">Encoder</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M 310 200 L 330 200" stroke="#999" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Era 3: Multimodal (2024) -->
  <g>
    <rect x="350" y="150" width="100" height="100" fill="#DA6B1F" rx="4"/>
    <text x="400" y="175" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Multimodal</text>
    <text x="400" y="195" font-size="11" text-anchor="middle" fill="white">Vision</text>
    <text x="400" y="210" font-size="11" text-anchor="middle" fill="white">+Audio</text>
    <text x="400" y="235" font-size="10" text-anchor="middle" fill="white">Separate</text>
    <text x="400" y="250" font-size="10" text-anchor="middle" fill="white">encoders</text>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M 460 200 L 480 200" stroke="#999" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Era 4: Thinking Models (2025) -->
  <g>
    <rect x="500" y="150" width="100" height="100" fill="#CE422B" rx="4"/>
    <text x="550" y="175" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Thinking</text>
    <text x="550" y="195" font-size="11" text-anchor="middle" fill="white">Models</text>
    <text x="550" y="210" font-size="11" text-anchor="middle" fill="white">GPT-5.4</text>
    <text x="550" y="235" font-size="10" text-anchor="middle" fill="white">Internal</text>
    <text x="550" y="250" font-size="10" text-anchor="middle" fill="white">reasoning</text>
  </g>
  
  <!-- Arrow 4 -->
  <path d="M 610 200 L 630 200" stroke="#999" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Era 5: Early-Fusion (2026) -->
  <g>
    <rect x="650" y="150" width="100" height="100" fill="#22863a" rx="4"/>
    <text x="700" y="175" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Early-Fusion</text>
    <text x="700" y="195" font-size="11" text-anchor="middle" fill="white">Native</text>
    <text x="700" y="210" font-size="11" text-anchor="middle" fill="white">Multimodal</text>
    <text x="700" y="235" font-size="10" text-anchor="middle" fill="white">Llama 4</text>
    <text x="700" y="250" font-size="10" text-anchor="middle" fill="white">Gemini</text>
  </g>
  
  <!-- Additional innovations on bottom -->
  <g>
    <!-- MoE -->
    <rect x="50" y="300" width="180" height="70" fill="#f0f0f0" stroke="#999" stroke-width="1" rx="4"/>
    <text x="140" y="320" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Mixture-of-Experts</text>
    <text x="140" y="338" font-size="10" text-anchor="middle" fill="#666">Sparse activation</text>
    <text x="140" y="353" font-size="10" text-anchor="middle" fill="#666">20x efficiency gain</text>
    <text x="140" y="365" font-size="9" text-anchor="middle" fill="#999">(Llama 4 Scout/Maverick)</text>
  </g>
  
  <g>
    <!-- Agentic -->
    <rect x="280" y="300" width="180" height="70" fill="#f0f0f0" stroke="#999" stroke-width="1" rx="4"/>
    <text x="370" y="320" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Agentic AI</text>
    <text x="370" y="338" font-size="10" text-anchor="middle" fill="#666">Desktop automation</text>
    <text x="370" y="353" font-size="10" text-anchor="middle" fill="#666">75% OSWorld</text>
    <text x="370" y="365" font-size="9" text-anchor="middle" fill="#999">(GPT-5.4 Standard)</text>
  </g>
  
  <g>
    <!-- Specialists -->
    <rect x="510" y="300" width="180" height="70" fill="#f0f0f0" stroke="#999" stroke-width="1" rx="4"/>
    <text x="600" y="320" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Specialized Models</text>
    <text x="600" y="338" font-size="10" text-anchor="middle" fill="#666">Security (Mythos)</text>
    <text x="600" y="353" font-size="10" text-anchor="middle" fill="#666">Mobile (Nano)</text>
    <text x="600" y="365" font-size="9" text-anchor="middle" fill="#999">(Domain-specific)</text>
  </g>
  
  <g>
    <!-- Context -->
    <rect x="740" y="300" width="110" height="70" fill="#f0f0f0" stroke="#999" stroke-width="1" rx="4"/>
    <text x="795" y="320" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Context</text>
    <text x="795" y="338" font-size="10" text-anchor="middle" fill="#666">2024: 200K</text>
    <text x="795" y="353" font-size="10" text-anchor="middle" fill="#666">2026: 10M</text>
    <text x="795" y="365" font-size="9" text-anchor="middle" fill="#999">(Llama Maverick)</text>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#999"/>
    </marker>
  </defs>
  
  <!-- Key insight -->
  <rect x="50" y="410" width="800" height="60" fill="#fffacd" stroke="#daa520" stroke-width="1" rx="4"/>
  <text x="450" y="430" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">
    Key Insight: 2026 focuses on efficiency (MoE), capability (thinking), and deployment (agentic, specialists)
  </text>
  <text x="450" y="450" font-size="11" text-anchor="middle" fill="#666">
    Unlike 2024-2025 (scaling), 2026 optimizes for production deployment and specialized use cases
  </text>
</svg>