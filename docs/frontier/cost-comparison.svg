<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="400" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">
    Cost per 1M Output Tokens (April 2026)
  </text>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#f9f9f9"/>
  
  <!-- Y-axis -->
  <line x1="100" y1="80" x2="100" y2="450" stroke="#333" stroke-width="2"/>
  <!-- X-axis -->
  <line x1="100" y1="450" x2="750" y2="450" stroke="#333" stroke-width="2"/>
  
  <!-- Grid lines -->
  <line x1="100" y1="400" x2="750" y2="400" stroke="#ddd" stroke-width="1"/>
  <line x1="100" y1="350" x2="750" y2="350" stroke="#ddd" stroke-width="1"/>
  <line x1="100" y1="300" x2="750" y2="300" stroke="#ddd" stroke-width="1"/>
  <line x1="100" y1="250" x2="750" y2="250" stroke="#ddd" stroke-width="1"/>
  <line x1="100" y1="200" x2="750" y2="200" stroke="#ddd" stroke-width="1"/>
  <line x1="100" y1="150" x2="750" y2="150" stroke="#ddd" stroke-width="1"/>
  
  <!-- Y-axis label -->
  <text x="50" y="30" font-size="12" fill="#333">Price ($)</text>
  
  <!-- Y-axis ticks and values -->
  <text x="85" y="455" font-size="11" text-anchor="end" fill="#666">$0</text>
  <text x="85" y="405" font-size="11" text-anchor="end" fill="#666">$5</text>
  <text x="85" y="355" font-size="11" text-anchor="end" fill="#666">$10</text>
  <text x="85" y="305" font-size="11" text-anchor="end" fill="#666">$15</text>
  <text x="85" y="255" font-size="11" text-anchor="end" fill="#666">$20</text>
  <text x="85" y="205" font-size="11" text-anchor="end" fill="#666">$25</text>
  <text x="85" y="155" font-size="11" text-anchor="end" fill="#666">$30</text>
  
  <!-- Bar 1: Llama 4 ($0) -->
  <rect x="120" y="450" width="60" height="0" fill="#CE422B" rx="3"/>
  <text x="150" y="470" font-size="11" text-anchor="middle" font-weight="bold" fill="#333">Llama 4</text>
  <text x="150" y="486" font-size="10" text-anchor="middle" fill="#22863a">FREE</text>
  
  <!-- Bar 2: GPT-5.4 Mini ($0.60) -->
  <rect x="190" y="435" width="60" height="15" fill="#00A67E" rx="3"/>
  <text x="220" y="470" font-size="11" text-anchor="middle" font-weight="bold" fill="#333">GPT Mini</text>
  <text x="220" y="486" font-size="10" text-anchor="middle" fill="#666">$0.60</text>
  
  <!-- Bar 3: Claude Haiku ($4) -->
  <rect x="260" y="370" width="60" height="80" fill="#DA6B1F" rx="3"/>
  <text x="290" y="470" font-size="11" text-anchor="middle" font-weight="bold" fill="#333">Haiku</text>
  <text x="290" y="486" font-size="10" text-anchor="middle" fill="#666">$4.00</text>
  
  <!-- Bar 4: GPT-5.4 Standard ($15) -->
  <rect x="330" y="150" width="60" height="300" fill="#00A67E" rx="3"/>
  <text x="360" y="470" font-size="11" text-anchor="middle" font-weight="bold" fill="#333">GPT Std</text>
  <text x="360" y="486" font-size="10" text-anchor="middle" fill="#666">$15.00</text>
  
  <!-- Bar 5: Claude Sonnet ($15) -->
  <rect x="400" y="150" width="60" height="300" fill="#DA6B1F" rx="3"/>
  <text x="430" y="470" font-size="11" text-anchor="middle" font-weight="bold" fill="#333">Sonnet</text>
  <text x="430" y="486" font-size="10" text-anchor="middle" fill="#666">$15.00</text>
  
  <!-- Bar 6: Gemini 3.1 ($14) -->
  <rect x="470" y="170" width="60" height="280" fill="#4285F4" rx="3"/>
  <text x="500" y="470" font-size="11" text-anchor="middle" font-weight="bold" fill="#333">Gemini</text>
  <text x="500" y="486" font-size="10" text-anchor="middle" fill="#666">$14.00</text>
  
  <!-- Bar 7: Claude Opus ($15) -->
  <rect x="540" y="150" width="60" height="300" fill="#DA6B1F" rx="3" opacity="0.8"/>
  <text x="570" y="470" font-size="11" text-anchor="middle" font-weight="bold" fill="#333">Opus</text>
  <text x="570" y="486" font-size="10" text-anchor="middle" fill="#666">$15.00</text>
  
  <!-- Bar 8: GPT-5.4 Thinking ($30) -->
  <rect x="610" y="50" width="60" height="400" fill="#00A67E" rx="3" opacity="0.6"/>
  <text x="640" y="470" font-size="11" text-anchor="middle" font-weight="bold" fill="#333">Thinking</text>
  <text x="640" y="486" font-size="10" text-anchor="middle" fill="#666">$30.00</text>
  
  <!-- Value proposition annotation -->
  <g>
    <rect x="120" y="35" width="140" height="30" fill="#22863a" rx="4" opacity="0.2"/>
    <text x="190" y="48" font-size="12" font-weight="bold" text-anchor="middle" fill="#22863a">
      Best Value: Mini + Standard Hybrid
    </text>
    <text x="190" y="62" font-size="10" text-anchor="middle" fill="#22863a">
      95% capability at 33% cost
    </text>
  </g>
  
  <!-- Footer -->
  <text x="400" y="495" font-size="10" text-anchor="middle" fill="#666" font-style="italic">
    Prices shown per 1 million output tokens (April 2026 pricing)
  </text>
</svg>