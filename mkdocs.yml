site_name: AI/ML Wiki
site_description: Frontier AI Models - April 2026
site_author: Alexander van Winkel
site_url: https://Alexico1969.github.io/AI-wiki/
repo_url: https://github.com/Alexico1969/AI-wiki
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site
use_directory_urls: true
nav_exclude_search: false
theme:
  name: material
  palette:
    - scheme: light
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Dark mode
    - scheme: dark
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.integrate

markdown_extensions:
  - pymdownx.emoji
  - pymdownx.tasklist
  - pymdownx.superfences
  - pymdownx.tabbed
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - offline

nav:
  - Home: index.md
  - Frontier AI Models (2026):
    - Overview: frontier/index.md
    - Model Comparison: frontier/model-comparison.md
    - Release Timeline: frontier/timeline.md
    - GPT-5.4 Family: frontier/gpt-5-4.md
    - Gemini 3.1 Pro: frontier/gemini-3-1.md
    - Claude 4.6 Series: frontier/claude-4-6.md
    - Llama 4 (Open-Weight): frontier/llama-4.md
    - Architecture & Innovation:
      - Thinking Models: frontier/thinking-models.md
      - Mixture-of-Experts: frontier/mixture-of-experts.md
      - Multimodal Fusion: frontier/multimodal-fusion.md
    - Benchmarks & Performance: frontier/benchmarks.md
    - Architecture Evolution: frontier/architecture-evolution.md
    - Specialized Topics:
      - Specialized & Variant Models: frontier/specialized-models.md
      - Agentic AI & Computer Use: frontier/agentic-ai.md
      - Economics & Deployment: frontier/economics.md
  - Foundation:
    - Intelligent Agent: concepts/intelligent-agent.md
    - Search Algorithms: concepts/search.md
    - Game Playing: concepts/game-playing.md
    - Constraint Satisfaction: concepts/constraint-satisfaction.md
  - Knowledge & Reasoning:
    - Knowledge-Based Agents: concepts/knowledge-based-agents.md
    - Propositional Logic: concepts/propositional-logic.md
    - First-Order Logic: concepts/first-order-logic.md
    - Knowledge Representation: concepts/knowledge-representation.md
  - Planning:
    - Classical Planning: concepts/classical-planning.md
  - Learning & Perception:
    - Machine Learning: concepts/machine-learning.md
    - Linear Regression: concepts/linear-regression.md
    - Logistic Regression: concepts/logistic-regression.md
    - Neural Networks: concepts/neural-networks.md
    - Backpropagation: concepts/backpropagation.md
    - Robotics: concepts/robotics.md
  - References:
    - Mathematical Foundations: references/mathematical-foundations.md
